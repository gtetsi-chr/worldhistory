<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World History Timeline</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div class="app-container">
        
        <aside class="timeline-sidebar">
            <div class="sidebar-header">
                <h2>ΧΡΟΝΟΛΟΓΙΟ</h2>
                <input type="text" id="timelineSearch" placeholder="Αναζήτηση...">
                <div class="filter-container">
                    <button class="filter-btn" data-type="Person" title="Πρόσωπα">👤</button>
                    <button class="filter-btn" data-type="Empire/State" title="Αυτοκρατορίες/Κράτη">🏛️</button>
                    <button class="filter-btn" data-type="Event/War" title="Γεγονότα/Πόλεμοι">⚔️</button>
                    <button class="filter-btn" data-type="Invention" title="Εφευρέσεις">💡</button>
                    <button class="filter-btn" data-type="Movement/Culture" title="Πολιτισμός/Κινήματα">🎨</button>
                </div>
            </div>
        
            <div class="timeline-scroll-container">
                <div class="timeline-wrapper">
                    <div class="vertical-line"></div>
                    <div id="timeline-axis"></div>
                </div>
            </div>
			
			<div class="zoom-controls">
			    <div class="zoom-row">
			        <button id="zoomOut">➖</button>
			        <div class="slider-wrapper">
			            <input type="range" id="zoomSlider" min="1" max="10" value="3" step="1">
			            <span id="zoomValue">3</span> </div>
			        <button id="zoomIn">➕</button>
			    </div>
			</div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                </header>

            <div class="grid-layout">
                
                <section class="info-column">
                    
                    <div id="entity-card" class="card">
                        <div id="card-content">
                            <h1>Καλώς ήρθατε</h1>
                            <p>Επιλέξτε μια χρονιά από το timeline αριστερά.</p>
                        </div>
                    </div>
                    
                    <div class="card ai-zone">
                        <h3 id="ai-title" style="margin: -5px 0px 15px 0px;">🤖 Ρώτησε την AI</h3>
                        <div id="chat-box"></div>
                        <div class="chat-input-area">
                            <input type="text" id="ai-input" placeholder="Ρώτα κάτι...">
                            <button id="send-ai-btn">OK</button>
                        </div>
                    </div>
                </section>

                <section class="media-column">
                    
                    <div id="map" class="card" style="height: 400px; width: 92%;"></div>
                    
                    <div id="image-container" class="card wikipedia-style">
                        <div class="wiki-header">
                            <span style="font-weight:bold;">Βικιπαίδεια</span>
                            <a id="wiki-top-link" href="#" target="_blank" style="color: brown; font-size: 0.75rem; text-decoration: none; display:none;">Ολόκληρο το άρθρο στη Wikipedia →</a>
                        </div>
                        <div id="wiki-body" style="padding: 15px;">
                            <div id="wiki-intro">
                                <p style="color: #666;">Επιλέξτε μια χρονιά από το timeline.</p>
                            </div>
                            <div id="wiki-full-content" style="display:none;"></div>
                            <button id="show-more-wiki" class="wiki-more-btn" style="display:none;">Δείξε περισσότερα</button>
                        </div>
                    </div>
                </section>
                
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
    
    <div id="custom-tooltip" class="custom-tooltip"></div>
    
</body>
</html>
