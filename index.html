<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World History Timeline | AI Enhanced</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="timeline-sidebar">
            <div id="timeline-axis">
                </div>
        </aside>

        <main class="content-area">
            <header class="top-nav">
                <input type="text" id="searchBar" placeholder="Αναζήτηση (π.χ. Σωκράτης)...">
                <div class="filters">
                    <button class="filter-btn active" data-type="all">Όλα</button>
                    <button class="filter-btn" data-type="Person">Πρόσωπα</button>
                    <button class="filter-btn" data-type="Empire/State">Κράτη</button>
                </div>
            </header>

            <div id="entity-display" class="entity-card">
                <div class="welcome-msg">
                    <h1>Ιστορικό Χρονλόγιο</h1>
                    <p>Επιλέξτε μια χρονική περίοδο ή αναζητήστε μια οντότητα για να ξεκινήσετε.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
